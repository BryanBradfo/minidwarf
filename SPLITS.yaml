#
# MiniDwarf valid/test split. Every problem is listed exactly once, kept
# near-balanced between `valid` and `test` as the benchmark grows across
# versions (v1: 12 problems, 6/6, balanced 3+3 across Structured Grids and
# N-Body; v2 adds 6 Dense Linear Algebra problems, split 3/3, for a 9/9
# total, then adds the first Sparse Linear Algebra problem, spmv_csr, for a
# 10/9 total).
valid:
  - gauss_blur_2d
  - heat_2d_step
  - jacobi_3d_7pt
  - nbody_gravity_force
  - nbody_potential
  - coulomb_1d
  - sgemm
  - gemv
  - transpose
  - spmv_csr
test:
  - laplacian_2d_5pt
  - sobel_2d
  - wave_2d_step
  - knn_distance_1d
  - pairwise_mean_dist
  - nbody_count_within_radius
  - gemm_bias
  - syrk
  - scaled_gemm
