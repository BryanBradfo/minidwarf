#
# MiniDwarf v1 valid/test split. Each of the 12 v1 problems is listed
# exactly once, 6 in `valid` and 6 in `test`, balanced 3+3 across the two
# Berkeley Dwarfs (Structured Grids, N-Body).
valid:
  - gauss_blur_2d
  - heat_2d_step
  - jacobi_3d_7pt
  - nbody_gravity_force
  - nbody_potential
  - coulomb_1d
test:
  - laplacian_2d_5pt
  - sobel_2d
  - wave_2d_step
  - knn_distance_1d
  - pairwise_mean_dist
  - nbody_count_within_radius
